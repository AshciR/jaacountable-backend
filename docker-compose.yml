services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jaacountable-app
    environment:
      APP_ENV: ${APP_ENV:-development}
      PORT: ${PORT:-8000}
      # DATABASE_URL points to the postgres service name (not localhost).
      # This overrides any DATABASE_URL in .env — intentional for Docker networking.
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-jaacountable_db}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_JSON: ${LOG_JSON:-false}
      LOG_FILE: ${LOG_FILE:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SENTRY_DSN: ${SENTRY_DSN:-}
      POSTHOG_API_KEY: ${POSTHOG_API_KEY:-}
      POSTHOG_HOST: ${POSTHOG_HOST:-https://app.posthog.com}
      # REDIS_URL points to the redis service name (not localhost).
      # This overrides any REDIS_URL in .env — intentional for Docker networking.
      REDIS_URL: redis://redis:6379
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${PORT:-8000}/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    # Uncomment for hot reload during development:
    # command: ["sh", "-c", "fastapi dev src/server/app.py --host 0.0.0.0 --port ${PORT:-8000}"]
    # volumes:
    #   - ./src:/app/src

  redis:
    image: redis:8-alpine
    container_name: redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-jaacountable_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-jaacountable_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
