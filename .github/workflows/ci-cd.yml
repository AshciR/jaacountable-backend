name: CI/CD

on:
  push:
    branches: [main]
    paths-ignore:
      - 'scripts/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'scripts/**'

jobs:
  # ---
  # CI — Continuous Integration
  # Run tests on every push and pull request to main.
  # ---

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.8"

      - name: Install dependencies
        run: uv sync

      - name: Pre-pull testcontainer images
        run: |
          docker pull postgres:17-alpine
          docker pull redis:8-alpine

      - name: Run unit tests
        run: uv run pytest tests/ -v --log-cli-level=INFO -n auto --dist loadfile -m "not external" --force-sugar

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.8"

      - name: Install dependencies
        run: uv sync

      - name: Pre-pull testcontainer images
        run: |
          docker pull postgres:17-alpine
          docker pull redis:8-alpine

      - name: Run integration tests
        run: uv run pytest tests/ -v --log-cli-level=INFO -n auto --dist loadfile -m integration --force-sugar
        env:
          OPENAI_CLASSIFICATION_API_KEY: ${{ secrets.OPENAI_CI }}
          OPENAI_EXTRACTOR_API_KEY: ${{ secrets.OPENAI_CI }}

  # ---
  # CD — Continuous Deployment
  # Build and push the Docker image, then trigger a deploy on Render.
  # Only runs on pushes to main (not pull requests).
  # ---

  docker-publish:
    needs: [unit-tests, integration-tests]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      short_sha: ${{ steps.sha-tag.outputs.tag }}
      lower_repo: ${{ steps.lower-repo.outputs.repo }}
    steps:
      - name: Checkout the code
        uses: actions/checkout@v5

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repository
        id: lower-repo
        run: echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ steps.lower-repo.outputs.repo }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Extract short SHA tag
        id: sha-tag
        run: |
          REVISION=$(echo '${{ steps.meta.outputs.json }}' | jq -r '.labels["org.opencontainers.image.revision"]')
          echo "tag=sha-${REVISION:0:7}" >> $GITHUB_OUTPUT

      - name: Log image metadata
        run: |
          echo "short_sha: ${{ steps.sha-tag.outputs.tag }}"
          echo "tags: ${{ steps.meta.outputs.tags }}"
          echo "labels: ${{ steps.meta.outputs.labels }}"

  migrate-db-schema:
    needs: [docker-publish]
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/_migrate-db.yml
    with:
      environment: staging
    secrets:
      database_url: ${{ secrets.STAGING_DATABASE_URL }}

  deploy:
    needs: [migrate-db-schema, docker-publish]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Trigger Render staging deploy
        id: trigger
        env:
          deploy_url: ${{ secrets.STAGING_RENDER_DEPLOY_HOOK_URL }}
        run: |
          TRIGGERED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          curl -sf "$deploy_url"
          echo "triggered_at=${TRIGGERED_AT}" >> $GITHUB_OUTPUT

      - name: Poll for staging deploy to go live
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: ${{ secrets.STAGING_RENDER_SERVICE_ID }}
          TRIGGERED_AT: ${{ steps.trigger.outputs.triggered_at }}
        run: |
          for i in $(seq 1 30); do
            RESPONSE=$(curl -sf \
              --header "Authorization: Bearer ${RENDER_API_KEY}" \
              "https://api.render.com/v1/services/${SERVICE_ID}/deploys?limit=1")
            STATUS=$(echo "$RESPONSE" | jq -r '.[0].deploy.status')
            CREATED=$(echo "$RESPONSE" | jq -r '.[0].deploy.createdAt')
            echo "Attempt ${i}/30: status=${STATUS} createdAt=${CREATED}"
            if [[ "$CREATED" > "$TRIGGERED_AT" ]]; then
              case "$STATUS" in
                live) echo "Staging is live!"; exit 0 ;;
                build_failed|update_failed|pre_deploy_failed|canceled)
                  echo "Deploy failed: ${STATUS}"; exit 1 ;;
              esac
            fi
            sleep 30
          done
          echo "Timed out waiting for staging deploy"; exit 1

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag image as staging
        env:
          IMAGE_BASE: ghcr.io/${{ needs.docker-publish.outputs.lower_repo }}
          SHA_TAG: ${{ needs.docker-publish.outputs.short_sha }}
        run: |
          docker pull ${IMAGE_BASE}:${SHA_TAG}
          docker tag  ${IMAGE_BASE}:${SHA_TAG} ${IMAGE_BASE}:staging
          docker push ${IMAGE_BASE}:staging
