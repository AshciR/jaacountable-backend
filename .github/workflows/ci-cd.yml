name: CI/CD

on:
  push:
    branches: [main]
    paths-ignore:
      - 'scripts/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'scripts/**'

jobs:
  # ---
  # CI — Continuous Integration
  # Run tests on every push and pull request to main.
  # ---

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.8"

      - name: Install dependencies
        run: uv sync

      - name: Pre-pull testcontainer images
        run: |
          docker pull postgres:17-alpine
          docker pull redis:8-alpine

      - name: Run unit tests
        run: uv run pytest tests/ -v --log-cli-level=INFO -n auto --dist loadfile -m "not external" --force-sugar

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.8"

      - name: Install dependencies
        run: uv sync

      - name: Pre-pull testcontainer images
        run: |
          docker pull postgres:17-alpine
          docker pull redis:8-alpine

      - name: Run integration tests
        run: uv run pytest tests/ -v --log-cli-level=INFO -n auto --dist loadfile -m integration --force-sugar
        env:
          OPENAI_CLASSIFICATION_API_KEY: ${{ secrets.OPENAI_CI }}
          OPENAI_EXTRACTOR_API_KEY: ${{ secrets.OPENAI_CI }}

  # ---
  # CD — Continuous Deployment
  # Build and push the Docker image, then trigger a deploy on Render.
  # Only runs on pushes to main (not pull requests).
  # ---

  docker-publish:
    needs: [unit-tests, integration-tests]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout the code
        uses: actions/checkout@v5

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  migrate-db-schema:
    needs: [docker-publish]
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/_migrate-db.yml
    with:
      environment: staging
    secrets:
      database_url: ${{ secrets.STAGING_DATABASE_URL }}

  deploy:
    needs: [migrate-db-schema]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          deploy_url: ${{ secrets.STAGING_RENDER_DEPLOY_HOOK_URL }}
        run: curl "$deploy_url"
